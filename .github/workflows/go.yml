name: Go

on:
  push:
    paths-ignore:
      - 'console/**'
  pull_request:
    paths-ignore:
      - 'console/**'

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Test
        run: make test
