name: Console

on:
  push:
    paths:
      - "console/**"
  pull_request:
    paths:
      - "console/**"

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Build the console container
      run: |
        make console-build
