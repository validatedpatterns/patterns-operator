name: Console

on:
  push:
    paths:
      - "console/**"
  pull_request:
    paths:
      - "console/**"

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Build the console container
      run: |
        make console-build-amd64
