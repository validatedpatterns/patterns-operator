name: Console

on:
  push:
    paths:
      - "console/**"
  pull_request:
    paths:
      - "console/**"

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        persist-credentials: false
    - name: Build the console container
      run: |
        make console-build-amd64
